<script type="text/babel">

// ── 1. KAPANMAYA KAÇ GÜN KALDI SAYAÇ BADGE ──────────────────────────────────
function GeriSayim({son}){
  if(!son||son==="Süresiz") return null;
  const bugun=new Date(); bugun.setHours(0,0,0,0);
  const kalan=Math.ceil((new Date(son)-bugun)/86400000);
  if(kalan<0) return <span style={{background:"#f1f5f9",color:"#64748b",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}}>Süre Doldu</span>;
  
  const isAcil = kalan <= 5;
  return <span className={isAcil ? "pulse" : ""} style={{
    display:"inline-flex",alignItems:"center",gap:3,
    background: isAcil ? "#fef2f2" : "#fff7e6",
    color: isAcil ? "#e8404a" : "#b45309",
    border: `1px solid ${isAcil ? "#fecaca" : "#fcd77a"}`,
    borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:700
  }}>
    <i className="ti ti-hourglass-high" style={{fontSize:11}} aria-hidden="true"/>
    {kalan===0 ? "Bugün Son Gün!" : kalan===1 ? "Yarın Kapanıyor!" : `Son ${kalan} Gün!`}
  </span>;
}

function DurumBadge({durum}){
  const dStr = (durum || "").toLocaleLowerCase("tr-TR").trim();

}

// ── Sihirbaz yardımcı fonksiyonları ─────────────────────────────────────────
function esnafMi(hTum) {
  return hTum.includes("esnaf") || hTum.includes("sanatkâr") || hTum.includes("teskomb");
}
function mikroyaUygunMu(hTum, hKaynak, hGrup) {
  // Mikro işletmeye uygun programlar
  if (hKaynak.includes("kosgeb")) return true; // KOSGEB tüm KOBİ'lere açık
  if (hKaynak.includes("kgf")) return true;
  if (hKaynak.includes("işkur") || hKaynak.includes("sgk")) return true;
  if (hGrup.includes("tarım")) return true;
  if (hGrup.includes("bölgesel kalkınma")) return true;
  if (hTum.includes("girişimci")) return true;
  // İhracat destekleri mikro işletmede nadiren uygulanır ama engel yok
  if (hGrup.includes("ihracat")) return true;
  return false;
}
function buyukFirmaMi(hTum, hKaynak, hGrup) {
  // Sadece büyük firmaya özel programlar (KOBİ'ye kapalı)
  if (hTum.includes("büyük işletme") || hTum.includes("stratejik yatırım ve büyük")) return true;
  return false;
}
function buyugaUygunMu(hKaynak, hGrup, hTum) {
  // Büyük firmaya uygun programlar
  if (hGrup.includes("yatırım teşvikleri")) return true;
  if (hKaynak.includes("t. kalkınma")) return true;
  if (hKaynak.includes("eximbank")) return true;
  if (hKaynak.includes("kgf")) return true;
  if (hKaynak.includes("sanayi ve teknoloji")) return true;
  if (hKaynak.includes("ticaret bakanlığı")) return true;
  if (hTum.includes("kapasite geliştirme")) return true;
  if (hKaynak.includes("tubitak") && !hTum.includes("1507")) return true; // 1507 sadece KOBİ
  if (hGrup.includes("enerji ve yeşil")) return true;
  if (hGrup.includes("istihdam")) return true;
  return false;
}
function kobisinirlimi(hTum, hKaynak) {
  // Bu programlar max 249 çalışanlı firmaya açık (KOBİ sınırı var)
  if (hTum.includes("1507")) return true; // TÜBİTAK 1507 sadece KOBİ
  if (hTum.includes("girisimci destek") || hTum.includes("girişimci destek programı")) return true;
  if (hTum.includes("hizli destek") || hTum.includes("hızlı destek")) return true;
  return false;
}

// Ana sayfa URL'lerini tespit et, spesifik arama yönlendir
function akillıUrl(h) {
  const url = h.url || '';
  // Bilinen ana sayfa pattern'leri
  const ANASAYFA = [
    /^https?:\/\/(www\.)?kosgeb\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?tubitak\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?sanayi\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?ticaret\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?iskur\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?sgk\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?hmb\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?kgf\.com\.tr\/?$/,
    /^https?:\/\/(www\.)?eximbank\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?kalkinma\.com\.tr\/?$/,
    /^https?:\/\/(www\.)?tarimorman\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?trakyaka\.org\.tr\/?$/,
    /^https?:\/\/(www\.)?ssb\.gov\.tr\/?$/,
    /^https?:\/\/(www\.)?tesk\.org\.tr\/?$/,
    /^https?:\/\/(www\.)?ab\.gov\.tr\/?$/,
  ];
  const anaSayfa = ANASAYFA.some(r => r.test(url));
  if (anaSayfa || !url) {
    // Programa özel Google araması
    const sorgu = encodeURIComponent(h.baslik + ' ' + h.kaynak + ' başvuru 2026');
    return 'https://www.google.com/search?q=' + sorgu;
  }
  return url;
}

function App(){
  const [data,setData]=useState([]);
  const [yukleniyor,setYukleniyor]=useState(true);
  const [hata,setHata]=useState(null);
  
  // ── 2. KARANLIK MOD STATE BAŞLANGICI ──────────────────────────────────────
  const [darkMode, setDarkMode] = useState(()=>{
    return localStorage.getItem("htr_theme") === "dark";
  });

  // ── 4. SİHİRBAZ STATE YAPISI ──────────────────────────────────────────────
  const [wizardSektor, setWizardSektor] = useState("");
  const [wizardOlcek, setWizardOlcek] = useState("");
  const [wizardHedef, setWizardHedef] = useState("");
  const [isWizardActive, setIsWizardActive] = useState(false);

  const [sektor,setSektor]=useState("Tüm Sektörler");
  const [grup,setGrup]=useState("Tümü");
  const [durum,setDurum]=useState("Tümü");
  const [tutarFiltre,setTutarFiltre]=useState("tumu");
  const [seciliButceIdx, setSeciliButceIdx] = useState(0); 
  const [arama,setArama]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [favoriler,setFavoriler]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("htr_favoriler")||"[]");}catch{return[];}
  });
  const [sadeceFavori,setSadeceFavori]=useState(false);
  const [paylasMod,setPaylasMod]=useState(null);

  useEffect(() => {
    if (darkMode) {
      document.body.classList.add("dark-mode");
      localStorage.setItem("htr_theme", "dark");
    } else {
      document.body.classList.remove("dark-mode");
      localStorage.setItem("htr_theme", "light");
    }
  }, [darkMode]);

  useEffect(()=>{
    const urls=['./data.json','../data.json','/data.json'];
    const tryFetch=(i)=>{
      if(i>=urls.length){setHata("Veri yüklenemedi");setYukleniyor(false);return;}
      fetch(urls[i]).then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
        .then(d=>{setData(d);setYukleniyor(false);}).catch(()=>tryFetch(i+1));
    };
    tryFetch(0);
  },[]);

  useEffect(()=>{
    try{localStorage.setItem("htr_favoriler",JSON.stringify(favoriler));}catch{}
  },[favoriler]);

  const toggleFavori=useCallback(id=>{
    setFavoriler(prev=>prev.includes(id)?prev.filter(f=>f!==id):[...prev,id]);
  },[]);
  const toggle=useCallback(id=>setExpanded(p=>p===id?null:id),[]);

  const tutariSayiyaCevir = (tutarStr) => {
    if (!tutarStr) return 0;
    let temizText = tutarStr.toLocaleLowerCase("tr-TR").replace(/\./g, "").replace(/,/g, "");
    if (temizText.includes("milyon") || temizText.includes("mlr")) {
      let match = temizText.match(/(\d+)/);
      return match ? parseInt(match[1]) * 1000000 : 0;
    }
    let match = temizText.match(/(\d+)/);
    return match ? parseInt(match[1]) : 0;
  };

  const sektorler=useMemo(()=>{
    if(!data.length)return["Tüm Sektörler"];
    return["Tüm Sektörler",...new Set(data.flatMap(h=>h.sektor).filter(s=>s!=="Tüm Sektörler"))].sort((a,b)=>a==="Tüm Sektörler"?-1:a.localeCompare(b,"tr"));
  },[data]);

  // Sihirbaz Eşleşme Oranı Hesaplayıcı Mantık Katsayısı
  const matchScore = useCallback((h) => {
    if (!isWizardActive) return 0;

    const hSektor = h.sektor.map(s => s.toLocaleLowerCase("tr-TR")).join(" ");
    const hGrup = h.grup.toLocaleLowerCase("tr-TR");
    const hKaynak = h.kaynak.toLocaleLowerCase("tr-TR");
    const hTum = (h.aciklama + " " + h.baslik + " " + h.kaynak + " " + h.grup).toLocaleLowerCase("tr-TR");
    const tumSektorKapsar = hSektor.includes("tüm sektörler");

    // ── ÖLÇEK TANIMLARI ──────────────────────────────────────────────────────
    const olcek = wizardOlcek;
    const isMikro  = olcek === "Mikro";   // 1-9 çalışan
    const isKucuk  = olcek === "KOBİ";    // 10-49 çalışan
    const isOrta   = olcek === "Orta";    // 50-249 çalışan
    const isBuyuk  = olcek === "Büyük";   // 250+
    const isKOBI   = isMikro || isKucuk || isOrta; // Tüm KOBİ spektrumu

    // ── PROGRAM ÖLÇEK KURALLARI ──────────────────────────────────────────────
    // Her program grubu/kaynağı için gerçekçi ölçek sınırları

    // Sadece esnaf/mikro programları
    const sadeceMikro = esnafMi(hTum);
    if (sadeceMikro && !isMikro) return 0;
    if (!sadeceMikro && isMikro && !mikroyaUygunMu(hTum, hKaynak, hGrup)) return 0;

    // Sadece büyük firma programları
    const sadeceBuyuk = buyukFirmaMi(hTum, hKaynak, hGrup);
    if (sadeceBuyuk && !isBuyuk) return 0;
    if (!sadeceBuyuk && isBuyuk && !buyugaUygunMu(hKaynak, hGrup, hTum)) return 0;

    // KOBİ üst sınırı olan programlar (max 249 çalışan)
    const sadeceKOBI = kobisinirlimi(hTum, hKaynak);
    if (sadeceKOBI && isBuyuk) return 0;

    // ── SEKTÖR × HEDEF × ÖLÇEK SKORLAMA ─────────────────────────────────────
    // Her ölçek için hangi kaynaklar öncelikli?
    const olcekBonus = (() => {
      if (isMikro) {
        if (hKaynak.includes("kosgeb")) return 30;
        if (hKaynak.includes("tesk") || esnafMi(hTum)) return 40;
        if (tumSektorKapsar) return 15;
        return 10;
      }
      if (isKucuk) {
        if (hKaynak.includes("kosgeb")) return 35;
        if (hKaynak.includes("tubitak") && hTum.includes("1507")) return 35;
        if (hKaynak.includes("kgf")) return 25;
        if (tumSektorKapsar) return 15;
        return 10;
      }
      if (isOrta) {
        if (hKaynak.includes("kosgeb")) return 30;
        if (hKaynak.includes("tubitak")) return 30;
        if (hGrup.includes("yatırım teşvikleri")) return 25;
        if (hKaynak.includes("kgf")) return 25;
        if (hKaynak.includes("ticaret bakanlığı") || hKaynak.includes("tim")) return 20;
        if (hKaynak.includes("kalkınma ajans") || hKaynak.includes("trakyaka")) return 20;
        if (tumSektorKapsar) return 15;
        return 10;
      }
      if (isBuyuk) {
        if (hGrup.includes("yatırım teşvikleri")) return 45;
        if (hKaynak.includes("t. kalkınma")) return 40;
        if (hKaynak.includes("kgf")) return 35;
        if (hKaynak.includes("eximbank")) return 35;
        if (hKaynak.includes("sanayi ve teknoloji")) return 30;
        if (hTum.includes("kapasite geliştirme")) return 30;
        if (hKaynak.includes("ticaret bakanlığı")) return 25;
        return 10;
      }
      return 15;
    })();

    // ── SEKTÖR PUANI ─────────────────────────────────────────────────────────
    const sektorMap = {
      "Enerji":                    ["enerji","yekdem","ges","güneş","yenilenebilir","yegm","epdk","yeşil"],
      "Üretim / İmalat":           ["üretim","imalat","sanayi","kapasite","makine","fabrika"],
      "Tekstil / Hazır Giyim":     ["tekstil","giyim","deri","hazır giyim","mobilya"],
      "Tarım / Gıda":              ["tarım","gıda","sulama","hayvancılık","kırsal","tkdk","ipard","organik"],
      "Teknoloji / Yazılım":       ["teknoloji","yazılım","ar-ge","inovasyon","dijital","teknokent"],
      "İhracat / Dış Ticaret":     ["ihracat","turquality","fuar","yurt dışı","eximbank","marka","pazar"],
      "Turizm":                    ["turizm","konaklama","termal","sağlık turizmi"],
      "Lojistik / Taşımacılık":    ["lojistik","taşımacılık","depo"],
      "Sağlık":                    ["sağlık","hastane","klinik","ilaç","tıbbi"],
      "İnşaat":                    ["inşaat","yapı","altyapı"],
      "Savunma":                   ["savunma","ssb"],
    };
    const sektorAnahtar = sektorMap[wizardSektor] || [];
    const sektorEslesiyor = tumSektorKapsar || sektorAnahtar.some(k => hSektor.includes(k) || hTum.includes(k));
    const sektorPuan = wizardSektor ? (sektorEslesiyor ? 25 : -5) : 10;

    // ── HEDEF PUANI ───────────────────────────────────────────────────────────
    const hedefMap = {
      "Makine / Teçhizat Alımı":             { poz:["yatırım teşvikleri","kapasite","makine","ekipman","kgf","kkydp","osb"], neg:["patent","fuar","marka","esnaf kredi"] },
      "Ar-Ge / İnovasyon":                   { poz:["ar-ge","inovasyon","tubitak","1507","1501","1511","teknokent","eureka","bigg","patent"], neg:["sulama","tarım","fuar"] },
      "İhracat / Uluslararasılaşma":         { poz:["ihracat","turquality","fuar","yurt dışı","eximbank","marka","e-ihracat","pazar","tim"], neg:["tarım","sulama","istihdam"] },
      "Yeşil Dönüşüm / Enerji Verimliliği":  { poz:["yeşil","enerji","yekdem","ges","çevre","yenilenebilir","yegm","sogreen"], neg:["ihracat","savunma","esnaf"] },
      "Dijitalleşme":                        { poz:["dijital","yazılım","teknoloji","teknokent","e-ihracat","mobil"], neg:["tarım","sulama","esnaf","inşaat"] },
      "İstihdam / Personel":                 { poz:["istihdam","işkur","sgk","personel","istihdamı koruma","eğitim","genç","kadın"], neg:["ihracat","ar-ge","patent"] },
      "Tesis / Altyapı Yatırımı":             { poz:["yatırım teşvikleri","kgf","osb","altyapı","tesis","kalkınma"], neg:["esnaf","fuar","patent"] },
      "Tarımsal Yatırım":                    { poz:["tarım","sulama","hayvancılık","gıda","ipard","tkdk","kkydp","kırsal","organik"], neg:["ihracat fuar","savunma","esnaf kredi"] },
      "Finansman / Kredi İhtiyacı":           { poz:["kgf","kredi","eximbank","kalkınma bankası","faiz desteği","teskomb","hazine","refinansman"], neg:["fuar","turquality","ar-ge başlangıç"] },
    };
    const h2 = hedefMap[wizardHedef];
    let hedefPuan = 0;
    if (h2) {
      hedefPuan += h2.poz.filter(k => hTum.includes(k) || hGrup.includes(k)).length * 20;
      hedefPuan -= h2.neg.filter(k => hTum.includes(k) || hGrup.includes(k)).length * 15;
    }

    // ── BÖLGESEL BONUS ────────────────────────────────────────────────────────
    const bölgeselBonus = (hKaynak.includes("trakyaka") || hGrup.includes("bölgesel kalkınma")) ? 10 : 0;

    return Math.max(0, olcekBonus + sektorPuan + hedefPuan + bölgeselBonus);

  }, [wizardSektor, wizardOlcek, wizardHedef, isWizardActive]);

  const filtered=useMemo(()=>{
    const durumSira={"kapanmak üzere":0,"açık":1,"kapandı":2};
    return data.filter(h=>{
      if(sadeceFavori&&!favoriler.includes(h.id))return false;
      
      // Sihirbaz aktifse genel filtreleri ezmesin, sihirbaza göre süzsün
      if (isWizardActive) {
        if (matchScore(h) < 40) return false;
      } else {
        if(sektor!=="Tüm Sektörler"&&!h.sektor.includes(sektor)&&!h.sektor.includes("Tüm Sektörler"))return false;
        if(grup!=="Tümü"&&h.grup!==grup)return false;
      }
      
      if(durum!=="Tümü"){
        const itemDurum = (h.durum || "").toLocaleLowerCase("tr-TR").trim();
        const filterDurum = durum.toLocaleLowerCase("tr-TR").trim();
        if(itemDurum !== filterDurum) return false;
      }
      
      if(tutarFiltre==="geri_odemsiz"&&!h.tutar.toLowerCase().includes("geri ödemesiz")&&!h.tutar.toLowerCase().includes("hibe"))return false;
      if(tutarFiltre==="ab"&&!h.grup.includes("AB")&&!h.kaynak.includes("AB")&&!h.kaynak.includes("Avrupa"))return false;
      if(tutarFiltre==="kgf"&&!h.grup.includes("KGF")&&!h.kaynak.includes("KGF"))return false;
      
      const hedonButce = BUTCELER[seciliButceIdx];
      if (hedonButce && (hedonButce.min > 0 || hedonButce.max < Infinity)) {
        const hibeTutari = tutariSayiyaCevir(h.tutar);
        if (hibeTutari > 0) {
          if (hibeTutari < hedonButce.min || hibeTutari > hedonButce.max) return false;
        } else {
          if (hedonButce.min > 5000000) return false; 
        }
      }
      
      if(arama){
        const q = arama.toLocaleLowerCase("tr-TR").trim();
        const baslik = (h.baslik || "").toLocaleLowerCase("tr-TR");
        const kaynak = (h.kaynak || "").toLocaleLowerCase("tr-TR");
        const aciklama = (h.aciklama || "").toLocaleLowerCase("tr-TR");
        const grupIsmi = (h.grup || "").toLocaleLowerCase("tr-TR");
        if(!baslik.includes(q) && !kaynak.includes(q) && !aciklama.includes(q) && !grupIsmi.includes(q)) return false;
      }
      return true;
    }).sort((a,b)=>{
      // Sihirbaz aktifse en yüksek puan alanı en tepeye yerleştir
      if (isWizardActive) {
        return matchScore(b) - matchScore(a);
      }
      const dStrA = (a.durum || "").toLocaleLowerCase("tr-TR").trim();
      const dStrB = (b.durum || "").toLocaleLowerCase("tr-TR").trim();
      const ds=(durumSira[dStrA]??1)-(durumSira[dStrB]??1);
      if(ds!==0)return ds;
      const aSon=a.son==="Süresiz"?new Date("2099-12-31"):new Date(a.son);
      const bSon=b.son==="Süresiz"?new Date("2099-12-31"):new Date(b.son);
      return aSon-bSon;
    });
  },[data,sektor,grup,durum,tutarFiltre,seciliButceIdx,arama,sadeceFavori,favoriler,isWizardActive,matchScore]);

  const acik=data.filter(h=>(h.durum || "").toLocaleLowerCase("tr-TR").trim()==="açık").length;
  const yakin=data.filter(h=>(h.durum || "").toLocaleLowerCase("tr-TR").trim()==="kapanmak üzere").length;
  
  const aktif=sektor!=="Tüm Sektörler"||grup!=="Tümü"||durum!=="Tümü"||tutarFiltre!=="tumu"||seciliButceIdx!==0||arama||sadeceFavori||isWizardActive;
  const sifirla=()=>{setSektor("Tüm Sektörler");setGrup("Tümü");setDurum("Tümü");setTutarFiltre("tumu");setSeciliButceIdx(0);setArama("");setSadeceFavori(false);setIsWizardActive(false);setWizardSektor("");setWizardOlcek("");setWizardHedef("");};
  const borderFor=d=>{
    const dStr = (d || "").toLocaleLowerCase("tr-TR").trim();
    return dStr==="açık"?"#00d28c":dStr==="kapanmak üzere"?"#f59820":"#e8404a";
  };

  return <div style={{minHeight:"100vh",background:"transparent"}}>

    {/* ── HEADER ── */}
    <div style={{background:"linear-gradient(to right, #0f1f45 0%, #1a3a6e 55%, #3a6aae 75%)",borderBottom:"1px solid var(--border)",position:"relative",overflow:"hidden"}}>
      <div style={{maxWidth:1000,margin:"0 auto",padding:"0 1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
          <span style={{color:"rgba(255,255,255,0.55)",fontSize:12,letterSpacing:"0.5px"}}>Çorlu Ticaret ve Sanayi Odası</span>
          
          {/* 🌓 TEMALAR ARASI GEÇİŞ BUTONU */}
          <button onClick={() => setDarkMode(!darkMode)} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",gap:5}}>
            <i className={`ti ${darkMode ? "ti-sun" : "ti-moon"}`}/> {darkMode ? "Aydınlık Mod" : "Karanlık Mod"}
          </button>
        </div>
        <div style={{padding:"16px 0 20px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16}}>
          <div style={{display:"flex",alignItems:"center",gap:16}}>
            <RadarLogo/>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                <h1 style={{color:"#fff",fontSize:26,fontWeight:700,letterSpacing:"-0.5px",lineHeight:1}}>
                  Hibe Teşvik <span style={{color:"#00d28c"}}>Radar</span>
                </h1>
                <span style={{background:"rgba(245,200,66,0.18)",color:"#f5c842",border:"1px solid rgba(245,200,66,0.3)",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600}}>
                  FİNANSMAN & HİBE
                </span>
              </div>
              <p style={{color:"rgba(255,255,255,0.5)",fontSize:13,marginTop:5}}>Türkiye'deki tüm hibe, teşvik ve yatırım finansmanı fırsatları</p>
            </div>
          </div>
          <img src="ctso-logo.png" alt="Çorlu TSO" className="hide-mobile" style={{width:72,height:72,borderRadius:8}} onError={e=>e.target.style.display="none"}/>
        </div>
      </div>
    </div>

    <div style={{maxWidth:1000,margin:"0 auto",padding:"1.5rem 1rem"}}>

      {/* ── 4. AKILLI PROJE EŞLEŞTİRME SİHİRBAZI ────────────────────────────────── */}
      <div style={{background:"var(--wizard-bg)",border:"1px solid var(--navy2)",borderRadius:14,padding:"1.25rem",marginBottom:"1rem",boxShadow:"0 4px 12px rgba(0,0,0,0.05)"}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
          <i className="ti ti-wand" style={{color:"var(--green)",fontSize:18}}/>
          <span style={{fontWeight:700,fontSize:15,color:"var(--text-main)"}}>Hızlı Eşleştirme Sihirbazı (Öneri Motoru)</span>
        </div>
        <div className="filter-cols" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:12}}>
          <select value={wizardSektor} onChange={e=>setWizardSektor(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-main)",fontSize:13}}>
            <option value="">1. Sektörünüzü Seçin</option>
            {sektorler.filter(s=>s!=="Tüm Sektörler").map(s=><option key={s} value={s}>{s}</option>)}
          </select>
          <select value={wizardOlcek} onChange={e=>setWizardOlcek(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-main)",fontSize:13}}>
            <option value="">2. Şirket Ölçeği</option>
            <option value="Mikro">Mikro İşletme (1-9 çalışan)</option>
            <option value="KOBİ">Küçük İşletme (10-49 çalışan)</option>
            <option value="Orta">Orta Büyüklükte İşletme (50-249 çalışan)</option>
            <option value="Büyük">Büyük İşletme (250+ çalışan)</option>
          </select>
          <select value={wizardHedef} onChange={e=>setWizardHedef(e.target.value)} style={{padding:"8px 10px",borderRadius:8,border:"1px solid var(--border)",background:"var(--bg-card)",color:"var(--text-main)",fontSize:13}}>
            <option value="">3. Yatırım Amacınız</option>
            <option value="ihracat">İhracat / Yurt Dışı Açılım</option>
            <option value="dijital">Dijital Dönüşüm / Yazılım</option>
            <option value="yeşil">Yeşil Dönüşüm / Güneş Enerjisi</option>
            <option value="makine">Makine / Teçhizat Alımı</option>
            <option value="arge">Ar-Ge / İnovasyon</option>
          </select>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          {isWizardActive && <button onClick={()=>{setIsWizardActive(false);setWizardSektor("");setWizardOlcek("");setWizardHedef("");}} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#ef4444",color:"#fff",fontSize:12,cursor:"pointer"}}>Sihirbazı Kapat</button>}
          <button onClick={()=>setIsWizardActive(true)} disabled={!wizardSektor && !wizardOlcek && !wizardHedef} style={{padding:"6px 16px",borderRadius:6,border:"none",background:"var(--green)",color:"#000",fontWeight:600,fontSize:12,cursor:"pointer",opacity:(!wizardSektor&&!wizardOlcek&&!wizardHedef)?0.5:1}}>Firmama Uygun Hibeleri Öner</button>
        </div>
      </div>

      {/* ── STAT KARTLARI ── */}
      {!yukleniyor&&!hata&&<div className="stat-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:"1.25rem"}}>
        <StatCard icon="ti-circle-check" value={acik} label="Açık Program" color="#00d28c"/>
        <StatCard icon="ti-alarm" value={yakin} label="Kapanmak Üzere" color="#f59820"/>
        <StatCard icon="ti-database" value={data.length} label="Toplam Fırsat" color="#1a3a6e"/>
        <StatCard icon="ti-heart" value={favoriler.length} label="Favorilerim" color="#e8404a"/>
      </div>}

      {/* ── DİSCLAIMER ── */}
      <div style={{background:"rgba(255,251,235,0.95)",border:"1px solid #fde68a",borderRadius:10,padding:"10px 16px",marginBottom:"1rem",fontSize:13,color:"#92400e",display:"flex",gap:10,alignItems:"flex-start"}}>
        <i className="ti ti-info-circle" style={{fontSize:17,marginTop:1,flexShrink:0}} aria-hidden="true"/>
        <span>Bu platform bilgilendirme amacıyla hazırlanmıştır. Güncel koşullar için ilgili kurumun resmi web sitesini ziyaret ediniz. <span style={{color:"#b45309",opacity:0.7}}>Son güncelleme: {new Date().toLocaleDateString("tr-TR")}</span></span>
      </div>

      {/* ── FİLTRE PANELİ ── */}
      <div style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,padding:"1.25rem",marginBottom:"1rem",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div className="filter-cols" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:"1rem",opacity:isWizardActive?0.4:1,pointerEvents:isWizardActive?"none":"auto"}}>
          <div>
            <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
              <i className="ti ti-search" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Arama
            </label>
            <input type="text" placeholder="Program veya kurum ara..." value={arama} onChange={e=>setArama(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,background:"var(--input-bg)",color:"var(--text-main)"}}/>
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
              <i className="ti ti-building-factory" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Sektör
            </label>
            <select value={sektor} onChange={e=>setSektor(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,background:"var(--input-bg)",color:"var(--text-main)"}}>
              {sektorler.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
              <i className="ti ti-filter" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Durum
            </label>
            <select value={durum} onChange={e=>setDurum(e.target.value)}
              style={{width:"100%",padding:"9px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,background:"var(--input-bg)",color:"var(--text-main)"}}>
              {DURUMLAR.map(d=><option key={d}>{d}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
              <i className="ti ti-cash" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Bütçe Ölçeği
            </label>
            <select value={seciliButceIdx} onChange={e=>setSeciliButceIdx(parseInt(e.target.value))}
              style={{width:"100%",padding:"9px 12px",border:"1px solid var(--border)",borderRadius:8,fontSize:13,background:"var(--input-bg)",color:"var(--text-main)"}}>
              {BUTCELER.map((b, idx)=><option key={idx} value={idx}>{b.label}</option>)}
            </select>
          </div>
        </div>

        {/* Tutar filtresi */}
        <div style={{marginBottom:"0.9rem"}}>
          <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
            <i className="ti ti-coins" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Destek Türü
          </label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {TUTAR_FILTRELER.map(f=>(
              <button key={f.key} className={`fchip ${tutarFiltre===f.key?"fchip-active":"fchip-inactive"}`} onClick={()=>setTutarFiltre(f.key)}>
                {f.label}
              </button>
            ))}
            <button className={`fchip ${sadeceFavori?"fchip-active":"fchip-inactive"}`} onClick={()=>setSadeceFavori(p=>!p)} style={sadeceFavori?{background:"#e8404a",borderColor:"#e8404a"}:{}}>
              <i className="ti ti-heart" style={{fontSize:11,marginRight:4}} aria-hidden="true"/>
              Favorilerim {favoriler.length>0&&`(${favoriler.length})`}
            </button>
          </div>
        </div>

        {/* Kategori chip'leri */}
        <div>
          <label style={{fontSize:11,color:"var(--text-light)",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.6px",fontWeight:500}}>
            <i className="ti ti-layout-grid" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Destek Kategorisi
          </label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6,opacity:isWizardActive?0.4:1,pointerEvents:isWizardActive?"none":"auto"}}>
            {GRUPLAR.map(g=>(
              <button key={g} className={`chip ${grup===g?"chip-active":"chip-inactive"}`} onClick={()=>setGrup(g)}>
                <i className={`ti ${GRUP_ICONS[g]||"ti-tag"}`} style={{fontSize:11,marginRight:4}} aria-hidden="true"/>{g}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── SONUÇ SATIRI ── */}
      <div style={{fontSize:13,color:"var(--text-muted)",marginBottom:"0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>
          <strong style={{color:"var(--navy2)",fontSize:15}}>{filtered.length}</strong>
          <span style={{color:"var(--text-light)"}}> / {data.length} program gösteriliyor {isWizardActive && "(Akıllı Sihirbaz Önerisine Göre Sıralandı)"}</span>
        </span>
        {aktif&&<button onClick={sifirla} style={{fontSize:12,color:"var(--text-main)",background:"transparent",border:"1px solid var(--border)",borderRadius:6,padding:"4px 12px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
          <i className="ti ti-x" style={{fontSize:12}} aria-hidden="true"/>Temizle
        </button>}
      </div>

      {/* ── YÜKLEME ── */}
      {yukleniyor&&<div>{[1,2,3].map(i=><div key={i} className="skeleton"/>)}</div>}

      {/* ── PROGRAM KARTLARI ── */}
      {!yukleniyor&&!hata&&(filtered.length===0
        ?<div style={{textAlign:"center",padding:"3rem",color:"#aaa",background:"var(--bg-card)",borderRadius:14,border:"1px solid var(--border)"}}>
          <i className="ti ti-mood-empty" style={{fontSize:44,display:"block",marginBottom:12}} aria-hidden="true"/>
          <div style={{fontSize:15,fontWeight:500,color:"var(--text-light)"}}>Bu kriterlere uygun program bulunamadı.</div>
        </div>
        :<div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(h=>{
            const open=expanded===h.id;
            const isFav=favoriler.includes(h.id);
            const score = matchScore(h);
            return <div key={h.id}
              style={{background:"var(--bg-card)",border:"1px solid var(--border)",borderRadius:14,borderLeft:`4px solid ${borderFor(h.durum)}`,overflow:"hidden",position:"relative"}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,0.08)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>

              {/* SİHİRBAZ ÖNERİ BADGE ŞERİDİ */}
              {isWizardActive && score >= 70 && (
                <div style={{position:"absolute",top:0,right:120,background:"linear-gradient(45deg, #7c3aed, #00d28c)",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:"0 0 6px 6px",letterSpacing:"0.5px",zIndex:5}}>
                  🔥 %{score} UYUMLU ÖNERİ
                </div>
              )}

              <button onClick={()=>toggle(h.id)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12,textAlign:"left"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                    <div style={{fontWeight:600,fontSize:14,color:"var(--text-main)",lineHeight:1.4}}>{h.baslik}</div>
                    
                    {/* ── 1. DİNAMİK KALAN GÜN SAYACI BADGE ENTEGRASYONU */}
                    <GeriSayim son={h.son}/>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{background:"rgba(56,189,248,0.15)",color:"var(--text-main)",borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:600}}>{h.kaynak}</span>
                    <span style={{background:"var(--input-bg)",color:"var(--text-muted)",borderRadius:6,padding:"3px 9px",fontSize:11,display:"inline-flex",alignItems:"center",gap:3}}>
                      <i className={`ti ${GRUP_ICONS[h.grup]||"ti-tag"}`} style={{fontSize:11}} aria-hidden="true"/>{h.grup}
                    </span>
                    {h.son!=="Süresiz"&&<span style={{background:"var(--input-bg)",color:"var(--text-muted)",borderRadius:6,padding:"3px 9px",fontSize:11,display:"inline-flex",alignItems:"center",gap:3}}>
                      <i className="ti ti-calendar" style={{fontSize:11}} aria-hidden="true"/>{new Date(h.son).toLocaleDateString("tr-TR")}
                    </span>}
                  </div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                  <DurumBadge durum={h.durum}/>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}>
                    <button onClick={e=>{e.stopPropagation();toggleFavori(h.id);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px",color:isFav?"#e8404a":"#ccc",fontSize:18}}>
                      <i className={isFav?"ti ti-heart-filled":"ti ti-heart"} aria-hidden="true"/>
                    </button>
                    <button onClick={e=>{e.stopPropagation();setPaylasMod(h);}} style={{background:"none",border:"none",cursor:"pointer",padding:"4px",color:"#aaa",fontSize:18}}>
                      <i className="ti ti-share" aria-hidden="true"/>
                    </button>
                    <i className={`ti ${open?"ti-chevron-up":"ti-chevron-down"}`} style={{fontSize:16,color:"#aaa"}} aria-hidden="true"/>
                  </div>
                </div>
              </button>

              {open&&<div style={{padding:"0 18px 16px",borderTop:"1px solid var(--border)"}}>
                <p style={{fontSize:13,color:"var(--text-muted)",lineHeight:1.65,margin:"12px 0"}}>{h.aciklama}</p>
                <div style={{display:"flex",gap:12,fontSize:13,flexWrap:"wrap",alignItems:"flex-start",marginBottom:14,padding:"10px 14px",background:"var(--input-bg)",borderRadius:8}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:6,color:"var(--text-main)"}}>
                    <i className="ti ti-coins" style={{fontSize:16,color:"var(--navy2)"}} aria-hidden="true"/>
                    <strong>{h.tutar}</strong>
                  </span>
                  {h.son!=="Süresiz"
                    ?<span style={{display:"inline-flex",alignItems:"center",gap:6,color:"var(--text-muted)"}}>
                      <i className="ti ti-calendar-event" style={{fontSize:15}} aria-hidden="true"/>
                      Son başvuru: <strong>{new Date(h.son).toLocaleDateString("tr-TR")}</strong>
                    </span>
                    :<span style={{display:"inline-flex",alignItems:"center",gap:6,color:"var(--text-muted)"}}>
                      <i className="ti ti-infinity" style={{fontSize:15}} aria-hidden="true"/>Süresiz başvuru
                    </span>
                  }
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {/* AKILLI LİNK: Ana sayfa ise programa özel Google araması */}
                  {(() => {
                    const ANASAYFALAR = [
                      "https://www.kosgeb.gov.tr","https://www.tubitak.gov.tr",
                      "https://www.sanayi.gov.tr","https://www.ticaret.gov.tr",
                      "https://www.iskur.gov.tr","https://www.sgk.gov.tr",
                      "https://www.hmb.gov.tr","https://www.kgf.com.tr",
                      "https://www.eximbank.gov.tr","https://www.kalkinma.com.tr",
                      "https://www.tarimorman.gov.tr","https://www.trakyaka.org.tr",
                      "https://www.ssb.gov.tr","https://www.tesk.org.tr",
                      "https://www.ab.gov.tr","https://www.tkdk.gov.tr",
                      "https://www.csb.gov.tr","https://www.yegm.gov.tr",
                    ];
                    const isAnaSayfa = !h.url || ANASAYFALAR.includes(h.url) || ANASAYFALAR.some(a => h.url === a + "/");
                    const targetUrl = isAnaSayfa
                      ? `https://www.google.com/search?q=${encodeURIComponent(h.baslik + " " + h.kaynak + " başvuru 2026")}`
                      : h.url;
                    return (
                      <a href={targetUrl} target="_blank" rel="noopener noreferrer"
                        style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:13,color:"#fff",background:"#1a3a6e",borderRadius:8,padding:"8px 18px",textDecoration:"none",fontWeight:500}}>
                        <i className={`ti ${isAnaSayfa ? "ti-search" : "ti-external-link"}`} style={{fontSize:14}} aria-hidden="true"/>
                        {isAnaSayfa ? "Programı Google'da Ara" : "Resmi Kaynağa Git"}
                      </a>
                    );
                  })()}
                  <button onClick={()=>setPaylasMod(h)} style={{display:"inline-flex",alignItems:"center",gap:7,fontSize:13,color:"var(--text-main)",background:"transparent",border:"1px solid var(--border)",borderRadius:8,padding:"8px 18px",cursor:"pointer",fontWeight:500}}>
                    <i className="ti ti-share" style={{fontSize:14}} aria-hidden="true"/>Paylaş
                  </button>
                </div>
              </div>}
            </div>;
          })}
        </div>
      )}

      {/* ── FOOTER ── */}
      <div style={{marginTop:"2rem",padding:"1.75rem",background:"var(--bg-card)",borderRadius:14,border:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:"1rem",paddingBottom:"1rem",borderBottom:"1px solid var(--border)"}}>
          <img src="ctso-logo.png" alt="Çorlu TSO" style={{width:64,height:64,borderRadius:8}} onError={e=>e.target.style.display="none"}/>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--text-main)"}}>Çorlu Ticaret ve Sanayi Odası</div>
            <div style={{fontSize:12,color:"var(--green)",fontWeight:500,marginTop:2}}>Hibe Teşvik Radar — Dijital Dönüşüm Platformu</div>
          </div>
        </div>
        <div style={{fontSize:12,color:"var(--text-light)",lineHeight:1.7}}>
          Çorlu Ticaret ve Sanayi Odası bilgilendirme platformudur. Sorumluluk üstlenmez.<br/>
          <span style={{color:"var(--text-light)",opacity:0.6}}>© 2026 Çorlu TSO — Hibe Teşvik Radar. Tüm hakları saklıdır.</span>
        </div>
      </div>

    </div>

    {/* ── PAYLAŞ MODAL ── */}
    {paylasMod&&<PaylasBtnleri program={paylasMod} onClose={()=>setPaylasMod(null)}/>}

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
