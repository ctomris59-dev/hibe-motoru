<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Çorlu TSO Hibe ve Teşvik Motoru — Türkiye'deki tüm hibe, teşvik, finansman ve yatırım destek programları"/>
<title>Çorlu TSO — Hibe &amp; Teşvik Motoru</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f3;color:#1a1a18;-webkit-font-smoothing:antialiased;}
  select,input{outline:none;font-family:inherit;}
  select:focus,input:focus{border-color:#1a3a5c!important;box-shadow:0 0 0 2px rgba(26,58,92,0.12);}
  .chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
  .chip{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid transparent;white-space:nowrap;font-weight:500;font-family:inherit;transition:background .12s,color .12s,border-color .12s;}
  .chip-active{background:#1a3a5c;color:#fff;border-color:#1a3a5c;}
  .chip-inactive{background:#f3f4f6;color:#555;border-color:rgba(0,0,0,0.1);}
  .chip-inactive:hover{border-color:#1a3a5c;color:#1a3a5c;background:#eef2f9;}
  a{color:inherit;} button{font-family:inherit;}
  @media(max-width:600px){.filter-grid{grid-template-columns:1fr!important;}.header-stats{display:none!important;}}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px;height:76px;margin-bottom:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback,useEffect}=React;

const GRUPLAR=["Hibe Programları","Yatırım Teşvikleri","İhracat ve Uluslararasılaşma","İhracat Finansmanı (Eximbank)","Kredi Garantisi (KGF)","Uygun Faizli Krediler","AB ve Uluslararası Hibeler","Bölgesel Kalkınma (Ajanslar)","Vergi ve SGK Avantajları","İstihdam ve Personel Destekleri","Tarım Destekleri","Enerji ve Yeşil Dönüşüm","Turizm Destekleri","Savunma Sektörü"];
const GRUP_ICONS={"Hibe Programları":"ti-gift","Yatırım Teşvikleri":"ti-trending-up","İhracat ve Uluslararasılaşma":"ti-world","İhracat Finansmanı (Eximbank)":"ti-ship","Kredi Garantisi (KGF)":"ti-shield-check","Uygun Faizli Krediler":"ti-cash","AB ve Uluslararası Hibeler":"ti-flag","Bölgesel Kalkınma (Ajanslar)":"ti-map-pin","Vergi ve SGK Avantajları":"ti-receipt-tax","İstihdam ve Personel Destekleri":"ti-users","Tarım Destekleri":"ti-plant","Enerji ve Yeşil Dönüşüm":"ti-leaf","Turizm Destekleri":"ti-beach","Savunma Sektörü":"ti-shield"};
const DURUMLAR=["Tümü","açık","kapanmak üzere","kapandı"];

function Badge({durum}){
  const c={"açık":{bg:"#e6f4ea",col:"#1e6e3a",ic:"ti-circle-check"},"kapanmak üzere":{bg:"#fff3e0",col:"#b45309",ic:"ti-alert-triangle"},"kapandı":{bg:"#fce8e8",col:"#991b1b",ic:"ti-circle-x"}}[durum]||{bg:"#eee",col:"#555",ic:"ti-help"};
  return <span style={{display:"inline-flex",alignItems:"center",gap:4,background:c.bg,color:c.col,borderRadius:12,padding:"3px 10px",fontSize:12,fontWeight:500,whiteSpace:"nowrap"}}>
    <i className={`ti ${c.ic}`} style={{fontSize:13}} aria-hidden="true"/>{durum.charAt(0).toUpperCase()+durum.slice(1)}
  </span>;
}

function App(){
  const [data,setData]=useState([]);
  const [yukleniyor,setYukleniyor]=useState(true);
  const [hata,setHata]=useState(null);
  const [sektor,setSektor]=useState("Tüm Sektörler");
  const [grup,setGrup]=useState("Tümü");
  const [durum,setDurum]=useState("açık");
  const [arama,setArama]=useState("");
  const [expanded,setExpanded]=useState(null);

  useEffect(()=>{
    // GitHub Pages'de data.json reponun kökünde, public/ altında değil
    // Önce aynı dizinde ara, sonra bir üstte
    const urls=['../data.json','./data.json','/data.json'];
    const tryFetch=(idx)=>{
      if(idx>=urls.length){ setHata('Veri dosyası bulunamadı'); setYukleniyor(false); return; }
      fetch(urls[idx])
        .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
        .then(d=>{ setData(d); setYukleniyor(false); })
        .catch(()=>tryFetch(idx+1));
    };
    tryFetch(0);
  },[]);

  const sektorler=useMemo(()=>{
    if(!data.length) return ["Tüm Sektörler"];
    return ["Tüm Sektörler",...new Set(data.flatMap(h=>h.sektor).filter(s=>s!=="Tüm Sektörler"))].sort((a,b)=>a==="Tüm Sektörler"?-1:a.localeCompare(b,"tr"));
  },[data]);

  const filtered=useMemo(()=>data.filter(h=>{
    if(sektor!=="Tüm Sektörler"&&!h.sektor.includes(sektor)&&!h.sektor.includes("Tüm Sektörler"))return false;
    if(grup!=="Tümü"&&h.grup!==grup)return false;
    if(durum!=="Tümü"&&h.durum!==durum)return false;
    if(arama){const q=arama.toLowerCase();if(!h.baslik.toLowerCase().includes(q)&&!h.kaynak.toLowerCase().includes(q)&&!h.aciklama.toLowerCase().includes(q)&&!h.grup.toLowerCase().includes(q))return false;}
    return true;
  }),[data,sektor,grup,durum,arama]);

  const acik=data.filter(h=>h.durum==="açık").length;
  const yakin=data.filter(h=>h.durum==="kapanmak üzere").length;
  const aktif=sektor!=="Tüm Sektörler"||grup!=="Tümü"||durum!=="açık"||arama;
  const sifirla=()=>{setSektor("Tüm Sektörler");setGrup("Tümü");setDurum("açık");setArama("");};
  const toggle=useCallback(id=>setExpanded(p=>p===id?null:id),[]);
  const borderFor=d=>d==="açık"?"#1e6e3a":d==="kapanmak üzere"?"#b45309":"#991b1b";

  return <div style={{minHeight:"100vh",background:"#f5f5f3"}}>
    <div style={{background:"#1a3a5c",padding:"1.25rem 1.5rem"}}>
      <div style={{maxWidth:960,margin:"0 auto",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
        <div>
          <div style={{color:"#fff",fontWeight:600,fontSize:17}}>
            <i className="ti ti-rocket" style={{fontSize:18,marginRight:7,verticalAlign:-2}} aria-hidden="true"/>
            Çorlu TSO — Hibe &amp; Teşvik Motoru
          </div>
          <div style={{color:"#93b8d8",fontSize:12,marginTop:3}}>Türkiye'deki tüm hibe, teşvik, finansman ve yatırım destek programları</div>
        </div>
        {!yukleniyor&&!hata&&<div className="header-stats" style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <span style={{background:"rgba(255,255,255,0.12)",color:"#fff",borderRadius:8,padding:"4px 11px",fontSize:12,display:"inline-flex",alignItems:"center",gap:5}}>
            <i className="ti ti-circle-check" style={{fontSize:13,color:"#6ee7b7"}} aria-hidden="true"/>{acik} açık
          </span>
          <span style={{background:"rgba(255,255,255,0.12)",color:"#fff",borderRadius:8,padding:"4px 11px",fontSize:12,display:"inline-flex",alignItems:"center",gap:5}}>
            <i className="ti ti-alert-triangle" style={{fontSize:13,color:"#fcd34d"}} aria-hidden="true"/>{yakin} kapanmak üzere
          </span>
          <span style={{background:"rgba(255,255,255,0.12)",color:"#fff",borderRadius:8,padding:"4px 11px",fontSize:12,display:"inline-flex",alignItems:"center",gap:5}}>
            <i className="ti ti-database" style={{fontSize:13,color:"#93c5fd"}} aria-hidden="true"/>{data.length} program
          </span>
        </div>}
      </div>
    </div>

    <div style={{maxWidth:960,margin:"0 auto",padding:"1.25rem 1rem"}}>
      <div style={{background:"#fffbeb",border:"0.5px solid #fcd34d",borderRadius:8,padding:"10px 14px",marginBottom:"1rem",fontSize:13,color:"#92400e",display:"flex",gap:8,alignItems:"flex-start"}}>
        <i className="ti ti-info-circle" style={{fontSize:16,marginTop:1,flexShrink:0}} aria-hidden="true"/>
        <span><strong>Bilgi amaçlıdır.</strong> Başvuru öncesinde resmi kaynak sitesini mutlaka ziyaret ediniz. Çorlu TSO sorumluluk kabul etmez. Son güncelleme: {new Date().toLocaleDateString("tr-TR")}</span>
      </div>

      {yukleniyor&&<div>{[1,2,3,4,5].map(i=><div key={i} className="skeleton"/>)}</div>}

      {hata&&<div style={{background:"#fce8e8",border:"0.5px solid #f09595",borderRadius:8,padding:"1.5rem",color:"#991b1b",textAlign:"center"}}>
        <i className="ti ti-alert-circle" style={{fontSize:32,display:"block",marginBottom:8}} aria-hidden="true"/>
        <strong>Veriler yüklenemedi</strong><br/>
        <span style={{fontSize:13,color:"#b91c1c"}}>{hata}</span>
      </div>}

      {!yukleniyor&&!hata&&<>
        <div style={{background:"#fff",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:12,padding:"1rem",marginBottom:"0.75rem"}}>
          <div className="filter-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10,marginBottom:"0.9rem"}}>
            <div>
              <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>
                <i className="ti ti-search" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Arama
              </label>
              <input type="text" placeholder="Program, kurum, konu..." value={arama} onChange={e=>setArama(e.target.value)}
                style={{width:"100%",padding:"7px 10px",border:"0.5px solid rgba(0,0,0,0.15)",borderRadius:7,fontSize:13,background:"#f9f9f7",color:"#1a1a18"}}/>
            </div>
            <div>
              <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>
                <i className="ti ti-building-factory" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Sektör
              </label>
              <select value={sektor} onChange={e=>setSektor(e.target.value)}
                style={{width:"100%",padding:"7px 10px",border:"0.5px solid rgba(0,0,0,0.15)",borderRadius:7,fontSize:13,background:"#f9f9f7",color:"#1a1a18"}}>
                {sektorler.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label style={{fontSize:11,color:"#666",display:"block",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.5px"}}>
                <i className="ti ti-filter" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Durum
              </label>
              <select value={durum} onChange={e=>setDurum(e.target.value)}
                style={{width:"100%",padding:"7px 10px",border:"0.5px solid rgba(0,0,0,0.15)",borderRadius:7,fontSize:13,background:"#f9f9f7",color:"#1a1a18"}}>
                {DURUMLAR.map(d=><option key={d}>{d.charAt(0).toUpperCase()+d.slice(1)}</option>)}
              </select>
            </div>
          </div>
          <div>
            <label style={{fontSize:11,color:"#666",display:"block",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.5px"}}>
              <i className="ti ti-layout-grid" style={{fontSize:12,marginRight:4}} aria-hidden="true"/>Destek kategorisi
            </label>
            <div className="chip-row">
              <button className={`chip ${grup==="Tümü"?"chip-active":"chip-inactive"}`} onClick={()=>setGrup("Tümü")}>Tümü</button>
              {GRUPLAR.map(g=>(
                <button key={g} className={`chip ${grup===g?"chip-active":"chip-inactive"}`} onClick={()=>setGrup(g)}>
                  <i className={`ti ${GRUP_ICONS[g]||"ti-tag"}`} style={{fontSize:12,marginRight:4}} aria-hidden="true"/>{g}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div style={{fontSize:13,color:"#666",marginBottom:"0.75rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span><strong style={{color:"#1a1a18"}}>{filtered.length}</strong> / {data.length} program gösteriliyor</span>
          {aktif&&<button onClick={sifirla} style={{fontSize:12,color:"#1a3a5c",background:"transparent",border:"0.5px solid #1a3a5c",borderRadius:6,padding:"3px 10px",cursor:"pointer",display:"inline-flex",alignItems:"center",gap:4}}>
            <i className="ti ti-x" style={{fontSize:12}} aria-hidden="true"/>Sıfırla
          </button>}
        </div>

        {filtered.length===0
          ?<div style={{textAlign:"center",padding:"3rem",color:"#888"}}>
            <i className="ti ti-mood-empty" style={{fontSize:40,display:"block",marginBottom:12}} aria-hidden="true"/>
            Bu kriterlere uygun program bulunamadı.
          </div>
          :<div style={{display:"flex",flexDirection:"column",gap:8}}>
            {filtered.map(h=>{
              const open=expanded===h.id;
              return <div key={h.id} style={{background:"#fff",border:"0.5px solid rgba(0,0,0,0.1)",borderRadius:12,borderLeft:`3px solid ${borderFor(h.durum)}`,overflow:"hidden"}}>
                <button onClick={()=>toggle(h.id)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"0.9rem 1.1rem",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,textAlign:"left"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:500,fontSize:14,color:"#1a1a18",marginBottom:6,lineHeight:1.4}}>{h.baslik}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                      <span style={{background:"#eef2f9",color:"#1a3a5c",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:500}}>{h.kaynak}</span>
                      <span style={{background:"#f3f4f6",color:"#6b7280",borderRadius:6,padding:"2px 8px",fontSize:11,display:"inline-flex",alignItems:"center",gap:3}}>
                        <i className={`ti ${GRUP_ICONS[h.grup]||"ti-tag"}`} style={{fontSize:11}} aria-hidden="true"/>{h.grup}
                      </span>
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6,flexShrink:0}}>
                    <Badge durum={h.durum}/>
                    <i className={`ti ${open?"ti-chevron-up":"ti-chevron-down"}`} style={{fontSize:14,color:"#888"}} aria-hidden="true"/>
                  </div>
                </button>
                {open&&<div style={{padding:"0 1.1rem 1rem",borderTop:"0.5px solid rgba(0,0,0,0.07)"}}>
                  <p style={{fontSize:13,color:"#555",lineHeight:1.6,margin:"10px 0 10px"}}>{h.aciklama}</p>
                  <div style={{display:"flex",gap:14,fontSize:13,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>
                    <span style={{display:"inline-flex",alignItems:"center",gap:5,color:"#1a1a18"}}>
                      <i className="ti ti-coins" style={{fontSize:14,color:"#1a3a5c"}} aria-hidden="true"/>
                      <strong>{h.tutar}</strong>
                    </span>
                    {h.son!=="Süresiz"
                      ?<span style={{display:"inline-flex",alignItems:"center",gap:5,color:"#666"}}>
                        <i className="ti ti-calendar" style={{fontSize:14}} aria-hidden="true"/>
                        Son başvuru: <strong>{new Date(h.son).toLocaleDateString("tr-TR")}</strong>
                      </span>
                      :<span style={{display:"inline-flex",alignItems:"center",gap:5,color:"#666"}}>
                        <i className="ti ti-infinity" style={{fontSize:14}} aria-hidden="true"/>Süresiz başvuru
                      </span>
                    }
                    {h.sektor[0]!=="Tüm Sektörler"&&<span style={{display:"inline-flex",alignItems:"center",gap:5,color:"#666"}}>
                      <i className="ti ti-building-factory" style={{fontSize:14}} aria-hidden="true"/>
                      {h.sektor.slice(0,4).join(", ")}{h.sektor.length>4?" +"+(h.sektor.length-4):""}
                    </span>}
                  </div>
                  <a href={h.url} target="_blank" rel="noopener noreferrer"
                    style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:13,color:"#fff",background:"#1a3a5c",borderRadius:8,padding:"7px 16px",textDecoration:"none",fontWeight:500}}>
                    <i className="ti ti-external-link" style={{fontSize:14}} aria-hidden="true"/>
                    Resmi kaynağa git
                  </a>
                </div>}
              </div>;
            })}
          </div>
        }
      </>}

      <div style={{textAlign:"center",marginTop:"1.5rem",fontSize:12,color:"#aaa",paddingBottom:"1.5rem"}}>
        Çorlu Ticaret ve Sanayi Odası — Üye Bilgilendirme Platformu<br/>
        <span style={{color:"#ccc"}}>hibeler.corlutso.org.tr · Bilgi amaçlıdır, resmi kaynak sitelerini ziyaret ediniz.</span>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
